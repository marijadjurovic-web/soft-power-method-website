[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# ── Clean URLs for serverless functions ───────────────────────────────────────

# Called by Make.com to generate a unique download token after PayPal payment
[[redirects]]
  from = "/api/generate-token"
  to = "/.netlify/functions/generate-token"
  status = 200
  force = true

# Download endpoint — linked from MailerLite email
[[redirects]]
  from = "/api/download"
  to = "/.netlify/functions/download"
  status = 200
  force = true

